name: 每日興櫃篩選

on:
  schedule:
    - cron: '30 8 * * 1-5'   # 台灣時間週一至週五 16:30
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 取得原始碼
        uses: actions/checkout@v5

      - name: 設定 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 安裝相依套件
        run: |
          pip install requests

      - name: 執行篩選
        run: |
          python screener.py
        continue-on-error: false

      - name: 顯示結果預覽
        if: always()
        run: |
          if [ -f results.json ]; then
            echo "✅ results.json 已生成"
            python -c "import json; d=json.load(open('results.json')); print(f'共篩 {d[\"totalScreened\"]} 支，{d[\"totalPassed\"]} 支通過')"
          else
            echo "❌ results.json 未生成"
          fi

      - name: 提交結果
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          if git diff --staged --quiet; then
            echo "無變更"
          else
            git commit -m "🤖 每日自動更新 $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
