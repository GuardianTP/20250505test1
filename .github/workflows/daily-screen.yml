name: 每日興櫃篩選

on:
  schedule:
    # 每日台灣時間 16:30 執行（收盤後）
    # cron 使用 UTC 時區，台灣 = UTC+8，所以 16:30 台灣 = 08:30 UTC
    - cron: '30 8 * * 1-5'   # 週一至週五
  workflow_dispatch:          # 允許手動觸發

permissions:
  contents: write   # 允許 push results.json 回 repo

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 取得原始碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 執行篩選
        run: |
          python screener.py
          echo "✅ 篩選完成"

      - name: 提交結果
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          if git diff --staged --quiet; then
            echo "無變更"
          else
            git commit -m "🤖 每日自動更新 $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
